<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nalanda | Digital Manuscript Library</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Sanskrit&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=DM+Mono:wght@400&display=swap');
        
        /* Global Styles & Variables */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --sand: #f5efe0; --sand2: #ede3cc; --sand3: #e0d4b8; --sand4: #c9b98a;
            --bark: #3d2b1f; --bark2: #5c4033; --bark3: #7a5c45;
            --terr: #b54a2a; --terr2: #d4623a;
            --ink: #1a1208; --ink2: #3d2b1f;
            --gold: #c9922a; --gold2: #e8b84b;
            --leaf: #4a6741; --leaf2: #6b8f5e;
        }

        body {
            background-color: #dfd7c3;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* App Container */
        .app {
            font-family: 'Crimson Pro', Georgia, serif;
            background: var(--sand);
            width: 100%;
            max-width: 1100px;
            min-height: 600px;
            display: grid;
            grid-template-columns: 210px 1fr;
            border: 1px solid var(--sand4);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Decorative Grid Background */
        .app::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(180,150,80,.08) 39px, rgba(180,150,80,.08) 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(180,150,80,.06) 39px, rgba(180,150,80,.06) 40px);
            pointer-events: none;
            z-index: 0;
        }

        /* Sidebar Styles */
        .side {
            background: var(--bark);
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            border-right: 2px solid var(--bark2);
        }

        .side::after {
            content: '';
            position: absolute;
            right: 0; top: 0; bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, var(--gold2), var(--gold), var(--terr), var(--gold));
            opacity: .5;
        }

        .logo-area { padding: 18px 16px 14px; border-bottom: 1px solid var(--bark2); }
        .logo-devanagari { font-family: 'Tiro Devanagari Sanskrit', serif; font-size: 22px; color: var(--gold2); line-height: 1; letter-spacing: .04em; margin-bottom: 2px; }
        .logo-en { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--sand4); font-family: 'DM Mono', monospace; }
        .logo-line { height: 1px; background: linear-gradient(90deg, var(--gold), transparent); margin-top: 10px; opacity: .5; }

        .nav-section { padding: 14px 0; flex: 1; }
        .nav-label { font-size: 9px; letter-spacing: .2em; text-transform: uppercase; color: var(--bark3); padding: 0 16px; margin-bottom: 6px; font-family: 'DM Mono', monospace; }
        
        .nb {
            display: flex; align-items: center; gap: 10px; padding: 12px 16px;
            font-size: 14px; color: var(--sand3); background: none; border: none;
            cursor: pointer; width: 100%; text-align: left;
            font-family: 'Crimson Pro', serif; transition: all .2s; position: relative;
        }
        .nb:hover { background: rgba(255,255,255,.06); color: var(--sand); }
        .nb.act { background: rgba(201,146,42,.12); color: var(--gold2); }
        .nb.act::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--gold2); }
        
        .nb-icon { width: 18px; height: 18px; flex-shrink: 0; opacity: .7; }
        .nbadge { margin-left: auto; background: var(--terr); color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 8px; font-family: 'DM Mono', monospace; }

        .side-footer { padding: 12px 16px; border-top: 1px solid var(--bark2); font-size: 10px; color: var(--bark3); font-family: 'DM Mono', monospace; line-height: 1.6; }

        /* Main Content Styles */
        .main { display: flex; flex-direction: column; position: relative; z-index: 1; overflow: hidden; }
        .topbar { background: rgba(245,239,224,.92); padding: 15px 20px; border-bottom: 1px solid var(--sand3); display: flex; align-items: center; gap: 12px; backdrop-filter: blur(4px); }
        .page-title { font-size: 20px; font-weight: 600; color: var(--bark); flex: 1; font-style: italic; }
        .page-title small { font-size: 11px; font-style: normal; font-weight: 400; color: var(--bark3); letter-spacing: .08em; text-transform: uppercase; display: block; font-family: 'DM Mono', monospace; }

        .srch { padding: 8px 12px; border: 1px solid var(--sand3); border-radius: 6px; font-size: 13px; background: rgba(255,255,255,.7); width: 220px; font-family: 'Crimson Pro', serif; }
        .addbtn { padding: 8px 16px; background: var(--terr); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-family: 'Crimson Pro', serif; }

        .content { flex: 1; overflow-y: auto; padding: 22px; }
        
        /* Stats & Tables */
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
        .scard { background: rgba(255,255,255,.55); border: 1px solid var(--sand3); border-radius: 8px; padding: 15px; text-align: center; }
        .scard .n { font-size: 28px; font-weight: 600; color: var(--bark); }
        .scard .l { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--bark3); font-family: 'DM Mono', monospace; }

        table { width: 100%; border-collapse: collapse; }
        th { padding: 10px; text-align: left; font-size: 10px; text-transform: uppercase; color: var(--bark3); font-family: 'DM Mono', monospace; border-bottom: 2px solid var(--sand3); }
        td { padding: 12px 10px; border-bottom: 1px solid rgba(193,185,138,.3); color: var(--ink); }

        /* UI Components */
        .pill { font-size: 11px; padding: 2px 9px; border-radius: 10px; font-family: 'DM Mono', monospace; }
        .pill-g { background: rgba(74,103,65,.12); color: var(--leaf); border: 1px solid rgba(74,103,65,.25); }
        .pill-r { background: rgba(181,74,42,.1); color: var(--terr); border: 1px solid rgba(181,74,42,.2); }
        .pill-b { background: rgba(201,146,42,.12); color: #8a6010; border: 1px solid rgba(201,146,42,.3); }
        .pill-gray { background: rgba(93,64,55,.08); color: var(--bark3); border: 1px solid rgba(93,64,55,.15); }

        .ab { font-size: 11px; padding: 4px 10px; border: 1px solid var(--sand3); border-radius: 5px; cursor: pointer; background: white; margin-right: 4px; font-family: 'DM Mono', monospace; }
        .ab:hover { background: var(--bark); color: var(--sand2); }

        /* Modal Styles */
        .mb { position: fixed; inset: 0; background: rgba(26,18,8,.6); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(3px); }
        .mbox { background: var(--sand); border-radius: 12px; padding: 25px; width: 380px; box-shadow: 0 15px 50px rgba(0,0,0,0.4); }
        .mbox h3 { margin-bottom: 20px; font-style: italic; color: var(--bark); border-bottom: 2px solid var(--gold); display: inline-block; }
        .fl { margin-bottom: 15px; }
        .fl label { font-size: 10px; text-transform: uppercase; color: var(--bark3); display: block; margin-bottom: 5px; font-family: 'DM Mono', monospace; }
        .fl input, .fl select { width: 100%; padding: 10px; border: 1px solid var(--sand3); border-radius: 6px; font-family: 'Crimson Pro', serif; }
        .mbrow { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="app">
        <aside class="side">
            <div class="logo-area">
                <div class="logo-devanagari">नालन्दा</div>
                <div class="logo-en">Nalanda</div>
                <div class="logo-line"></div>
            </div>
            
            <nav class="nav-section">
                <div class="nav-label">Library</div>
                <button class="nb act" onclick="nav('books',this)">
                    <svg class="nb-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h5v12H4zM11 4h5v12h-5z"/></svg>
                    Manuscripts
                </button>
                <button class="nb" onclick="nav('members',this)">
                    <svg class="nb-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="7" r="3"/><path d="M4 17c0-3.314 2.686-6 6-6s6 2.686 6 6"/></svg>
                    Scholars
                </button>
                <button class="nb" onclick="nav('issued',this)">
                    <svg class="nb-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 10h12M10 4l6 6-6 6"/></svg>
                    Issued <span class="nbadge" id="ibadge">0</span>
                </button>
                <button class="nb" onclick="nav('overdue',this)">
                    <svg class="nb-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="7"/><path d="M10 6v4l2.5 2.5"/></svg>
                    Overdue <span class="nbadge" id="obadge">0</span>
                </button>
            </nav>

            <footer class="side-footer">
                Est. 5th Century CE<br/>
                Magadha, India<br/>
                ✦ Knowledge is eternal
            </footer>
        </aside>

        <main class="main">
            <header class="topbar">
                <div class="page-title" id="ptitle">Manuscripts <small>Book Catalog</small></div>
                <input class="srch" id="srch" placeholder="Search texts..." oninput="render()"/>
                <button class="addbtn" onclick="openAdd()">+ Enroll New</button>
            </header>
            
            <section class="content" id="ct"></section>
        </main>
    </div>

    <div id="mdl" style="display:none"></div>

    <script>
        let page = 'books';
        const genres = ['Philosophy', 'Mathematics', 'Medicine', 'Astronomy', 'Grammar', 'Theology', 'Literature', 'History', 'Science'];
        
        let books = [
            {id: 'B001', title: 'Arthashastra', author: 'Kautilya', genre: 'Philosophy', copies: 3, available: 2},
            {id: 'B002', title: 'Aryabhatiya', author: 'Aryabhata', genre: 'Mathematics', copies: 2, available: 1},
            {id: 'B003', title: 'Charaka Samhita', author: 'Charaka', genre: 'Medicine', copies: 4, available: 4},
            {id: 'B004', title: 'Panchatantra', author: 'Vishnu Sharma', genre: 'Literature', copies: 2, available: 0},
            {id: 'B005', title: 'Surya Siddhanta', author: 'Unknown', genre: 'Astronomy', copies: 3, available: 3},
        ];

        let members = [
            {id: 'M001', name: 'Arjun Sharma', role: 'Student', active: true},
            {id: 'M002', name: 'Priya Patel', role: 'Research Scholar', active: true},
            {id: 'M003', name: 'Rohan Desai', role: 'Faculty', active: true},
        ];

        let issued = [];
        
        // Helper to get dates relative to today
        const dOf = (n) => {
            let d = new Date();
            d.setDate(d.getDate() + n);
            return d.toISOString().split('T')[0];
        };

        // Seed initial data
        issued.push({id: 'I001', bookId: 'B002', memberId: 'M001', date: dOf(-8), due: dOf(-1), ret: false});
        issued.push({id: 'I002', bookId: 'B004', memberId: 'M002', date: dOf(-3), due: dOf(11), ret: false});

        const gBook = id => books.find(b => b.id === id) || {title: 'Unknown', author: ''};
        const gMem = id => members.find(m => m.id === id) || {name: 'Unknown'};
        const isOD = i => !i.ret && new Date(i.due) < new Date();
        const dLate = i => Math.max(0, Math.round((new Date() - new Date(i.due)) / 86400000));
        const qv = () => document.getElementById('srch').value.toLowerCase();

        function badges() {
            document.getElementById('ibadge').textContent = issued.filter(i => !i.ret).length;
            document.getElementById('obadge').textContent = issued.filter(i => isOD(i)).length;
        }

        function nav(p, btn) {
            page = p;
            document.querySelectorAll('.nb').forEach(b => b.classList.remove('act'));
            btn.classList.add('act');
            const titles = {
                books: ['Manuscripts', 'Book Catalog'],
                members: ['Scholars', 'Member Registry'],
                issued: ['Issued Texts', 'Active Loans'],
                overdue: ['Overdue', 'Pending Returns']
            };
            const t = titles[p];
            document.getElementById('ptitle').innerHTML = `${t[0]} <small>${t[1]}</small>`;
            document.getElementById('srch').value = '';
            render();
        }

        function render() {
            badges();
            const c = document.getElementById('ct'), q = qv();
            
            if (page === 'books') {
                const list = books.filter(b => b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q));
                const tc = books.reduce((s, b) => s + b.copies, 0), ta = books.reduce((s, b) => s + b.available, 0);
                c.innerHTML = `
                    <div class="stats">
                        <div class="scard hi"><div class="n">${books.length}</div><div class="l">Texts</div></div>
                        <div class="scard"><div class="n">${tc}</div><div class="l">Copies</div></div>
                        <div class="scard"><div class="n">${ta}</div><div class="l">Available</div></div>
                        <div class="scard"><div class="n">${tc - ta}</div><div class="l">Loaned</div></div>
                    </div>
                    ${list.length ? `
                    <table>
                        <thead><tr><th>Title</th><th>Author</th><th>Subject</th><th>Stock</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody>${list.map(b => `
                            <tr>
                                <td style="font-weight:600; font-style:italic; color:var(--bark)">${b.title}</td>
                                <td style="color:var(--bark3)">${b.author}</td>
                                <td><span class="pill pill-b">${b.genre}</span></td>
                                <td style="font-family:'DM Mono'">${b.available}/${b.copies}</td>
                                <td><span class="pill ${b.available > 0 ? 'pill-g' : 'pill-r'}">${b.available > 0 ? 'Available' : 'Loaned Out'}</span></td>
                                <td>
                                    ${b.available > 0 ? `<button class="ab" onclick="openIssue('${b.id}')">Issue</button>` : ''}
                                    <button class="ab" onclick="delB('${b.id}')">Del</button>
                                </td>
                            </tr>`).join('')}
                        </tbody>
                    </table>` : `<div class="empty">No manuscripts found</div>`}`;
            } 
            else if (page === 'members') {
                const list = members.filter(m => m.name.toLowerCase().includes(q));
                c.innerHTML = `
                    <div class="stats">
                        <div class="scard hi"><div class="n">${members.length}</div><div class="l">Scholars</div></div>
                        <div class="scard"><div class="n">${members.filter(m => m.active).length}</div><div class="l">Active</div></div>
                        <div class="scard"><div class="n">${issued.filter(i => !i.ret).length}</div><div class="l">Books Out</div></div>
                    </div>
                    <table>
                        <thead><tr><th>Scholar</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody>${list.map(m => `
                            <tr>
                                <td style="font-weight:600;color:var(--bark)">${m.name}</td>
                                <td><span class="pill pill-gray">${m.role}</span></td>
                                <td><span class="pill ${m.active ? 'pill-g' : 'pill-r'}">${m.active ? 'Active' : 'Inactive'}</span></td>
                                <td><button class="ab" onclick="delM('${m.id}')">Remove</button></td>
                            </tr>`).join('')}
                        </tbody>
                    </table>`;
            }
            else if (page === 'issued' || page === 'overdue') {
                const list = (page === 'overdue') ? issued.filter(isOD) : issued.filter(i => !i.ret);
                c.innerHTML = `
                    <table>
                        <thead><tr><th>Text</th><th>Scholar</th><th>Due Date</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody>${list.map(i => {
                            const b = gBook(i.bookId), m = gMem(i.memberId), od = isOD(i);
                            return `
                            <tr>
                                <td style="font-weight:600;font-style:italic">${b.title}</td>
                                <td>${m.name}</td>
                                <td style="color:${od ? 'var(--terr)' : 'inherit'}">${i.due}</td>
                                <td><span class="pill ${od ? 'pill-r' : 'pill-b'}">${od ? 'Overdue' : 'Active'}</span></td>
                                <td><button class="ab" onclick="retBook('${i.id}')">Return</button></td>
                            </tr>`;
                        }).join('')}
                        </tbody>
                    </table>`;
            }
        }

        // Modal Controls
        function modal(html) {
            const e = document.getElementById('mdl');
            e.style.display = 'flex';
            e.className = 'mb';
            e.innerHTML = html;
        }

        function closeM() { document.getElementById('mdl').style.display = 'none'; }

        function openAdd() {
            if (page === 'books') modal(`
                <div class="mbox">
                    <h3>Enroll New Manuscript</h3>
                    <div class="fl"><label>Title</label><input id="ft" /></div>
                    <div class="fl"><label>Author</label><input id="fa" /></div>
                    <div class="fl"><label>Subject</label><select id="fg">${genres.map(g => `<option>${g}</option>`).join('')}</select></div>
                    <div class="fl"><label>Copies</label><input id="fc" type="number" value="1"/></div>
                    <div class="mbrow"><button class="ab" onclick="closeM()">Cancel</button><button class="addbtn" onclick="saveB()">Enroll</button></div>
                </div>`);
            else if (page === 'members') modal(`
                <div class="mbox">
                    <h3>Register Scholar</h3>
                    <div class="fl"><label>Name</label><input id="fn" /></div>
                    <div class="fl"><label>Role</label><select id="fr"><option>Student</option><option>Faculty</option></select></div>
                    <div class="mbrow"><button class="ab" onclick="closeM()">Cancel</button><button class="addbtn" onclick="saveM()">Register</button></div>
                </div>`);
        }

        function saveB() {
            const t = document.getElementById('ft').value, a = document.getElementById('fa').value, g = document.getElementById('fg').value, c = parseInt(document.getElementById('fc').value);
            if (!t || !a) return;
            books.push({id: 'B' + Date.now(), title: t, author: a, genre: g, copies: c, available: c});
            closeM(); render();
        }

        function saveM() {
            const n = document.getElementById('fn').value, r = document.getElementById('fr').value;
            if (!n) return;
            members.push({id: 'M' + Date.now(), name: n, role: r, active: true});
            closeM(); render();
        }

        function openIssue(bookId) {
            const mOpts = members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
            modal(`
                <div class="mbox">
                    <h3>Issue Text</h3>
                    <div class="fl"><label>Scholar</label><select id="fm">${mOpts}</select></div>
                    <div class="fl"><label>Return By</label><input id="fd" type="date" value="${dOf(14)}"/></div>
                    <div class="mbrow"><button class="ab" onclick="closeM()">Cancel</button><button class="addbtn" onclick="saveI('${bookId}')">Issue</button></div>
                </div>`);
        }

        function saveI(bookId) {
            const mid = document.getElementById('fm').value, dd = document.getElementById('fd').value;
            const b = books.find(x => x.id === bookId);
            b.available--;
            issued.push({id: 'I' + Date.now(), bookId, memberId: mid, date: dOf(0), due: dd, ret: false});
            closeM(); render();
        }

        function retBook(id) {
            const i = issued.find(x => x.id === id);
            i.ret = true;
            const b = books.find(x => x.id === i.bookId);
            if (b) b.available++;
            render();
        }

        function delB(id) { books = books.filter(b => b.id !== id); render(); }
        function delM(id) { members = members.filter(m => m.id !== id); render(); }

        // Initial render
        render();
    </script>
</body>
</html>
